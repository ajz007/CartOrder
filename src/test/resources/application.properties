spring.datasource.url=jdbc:h2:mem:cartorder;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
app.jwt.secret=test-secret-key-that-is-at-least-32-characters
app.jwt.expiration-seconds=3600
app.product-catalog.base-url=http://localhost:8081
app.checkout.tax-rate=0.18
app.checkout.shipping-fee=0.00
app.kafka.topic.order-created=order.created
spring.kafka.bootstrap-servers=localhost:9094
spring.kafka.consumer.group-id=cart-order-service-test
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.scaler.capstone.cartorder.event
spring.kafka.consumer.properties.spring.json.value.default.type=com.scaler.capstone.cartorder.event.OrderCreatedEvent
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.listener.auto-startup=false
