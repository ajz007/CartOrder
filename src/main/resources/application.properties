spring.application.name=CartOrder
server.port=8083
spring.datasource.url=jdbc:mysql://localhost:3306/cartorder?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

app.jwt.secret=change-this-to-a-local-dev-secret-key-12345
app.jwt.expiration-seconds=3600
app.product-catalog.base-url=http://localhost:8081
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=cart-order-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.scaler.capstone.cartorder.event
spring.kafka.consumer.properties.spring.json.value.default.type=com.scaler.capstone.cartorder.event.OrderCreatedEvent
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
app.kafka.topic.order-created=order.created
