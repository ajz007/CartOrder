spring.application.name=CartOrder
server.port=${SERVER_PORT:8083}
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:order_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:change-this-to-a-local-dev-secret-key-12345}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}
app.product-catalog.base-url=${PRODUCT_CATALOG_BASE_URL:http://localhost:8081}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID:cart-order-service}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.scaler.capstone.cartorder.event
spring.kafka.consumer.properties.spring.json.value.default.type=com.scaler.capstone.cartorder.event.OrderCreatedEvent
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
app.kafka.topic.order-created=${KAFKA_TOPIC_ORDER_CREATED:order.created}
