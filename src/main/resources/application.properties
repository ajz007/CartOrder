spring.application.name=CartOrder
server.port=${SERVER_PORT:8083}
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:order_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:change-this-to-a-local-dev-secret-key-12345}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}
app.product-catalog.base-url=${PRODUCT_CATALOG_BASE_URL:http://localhost:8081}
